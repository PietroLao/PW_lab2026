{% extends "base.html" %}

{% block content %}
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h2>Prodotto Aggiunto!</h2>
            <p class="success-message">Il prodotto è stato aggiunto con successo al catalogo.</p>
            
            <div class="product-details">
                <div class="detail-item">
                    <span class="detail-label">Nome:</span>
                    <span class="detail-value">{{ product.name }}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Prezzo:</span>
                    <span class="detail-value">€{{ product.price }}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Ubicazione:</span>
                    <span class="detail-value">{{ product.location }}</span>
                </div>
            </div>
            
            <div class="action-buttons">
                <a href="/" class="btn btn-primary">Torna alla Home</a>
                <a href="/products" class="btn btn-secondary">Visualizza Prodotti</a>
                <a href="/product_form" class="btn btn-tertiary">Aggiungi Altro</a>
            </div>
        </div>
    </div>
{% endblock %}
